<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PSBKJED – PRBTYM4 – Complete</title>
  <style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 28px 16px;
    box-sizing: border-box;
}
.container {
    background: #fff;
    border-radius: 12px;
    padding: 40px 44px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    max-width: 740px;
    width: 100%;
}
.header {
    font-size: 12px;
    font-weight: 700;
    color: #999;
    letter-spacing: .07em;
    text-transform: uppercase;
    margin-bottom: 18px;
}
.question {
    font-size: 16px;
    line-height: 1.75;
    color: #1a1a1a;
    margin-bottom: 28px;
}
.note {
    font-size: 13px;
    color: #888;
    font-style: italic;
    margin-top: 4px;
}
.btn {
    background: #0066ff;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background .15s;
}
.btn:hover  { background: #004ecc; }
.btn:disabled { background: #bbb; cursor: default; pointer-events: none; }
.btn-ghost {
    background: #f0f4ff;
    color: #0066ff;
    border: 1.5px solid #cce0ff;
}
.btn-ghost:hover { background: #ddeaff; }
.btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 22px;
    align-items: center;
}
#feedback {
    margin-top: 14px;
    font-size: 15px;
    font-weight: 700;
    min-height: 22px;
}
.correct   { color: #1b7a2a; }
.incorrect { color: #c0250a; }
#hintDisplay {
    display: none;
    margin-top: 14px;
    font-style: italic;
    color: #555;
    font-size: 14px;
    line-height: 1.6;
    background: #f7faff;
    border-left: 3px solid #99c2ff;
    padding: 10px 14px;
    border-radius: 0 5px 5px 0;
}
#nextButton { display: none; }
.option-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 5px 0;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    cursor: pointer;
    font-size: 15px;
    line-height: 1.5;
    transition: background .1s, border-color .1s;
}
.option-label:hover { background: #f0f6ff; border-color: #cce0ff; }
.option-label input { margin-top: 3px; flex-shrink: 0; }
.text-row {
    display: flex;
    align-items: center;
    gap: 12px;
}
#answer {
    flex: 1;
    border: none;
    border-bottom: 2px solid #ccc;
    padding: 8px 2px;
    font-size: 16px;
    outline: none;
    background: transparent;
    transition: border-color .15s;
}
#answer:focus { border-bottom-color: #0066ff; }
</style>
</head>
<body>
<div class="container" style="text-align:center;margin-top:60px;">
  <p style="font-size:13px;font-weight:700;color:#aaa;letter-spacing:.07em;text-transform:uppercase;">Assignment Complete</p>
  <p style="font-size:16px;color:#555;margin-top:8px;">Your completion code:</p>
  <p style="font-size:36px;font-weight:800;letter-spacing:.12em;color:#0066ff;margin:16px 0;">qIkIE0s</p>
</div>
</body>
</html>
